<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع السمر | بوابة الإبداع الرقمي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #1a1a2e, #16213e); 
            color: #ffffff; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
        }
        .hero { 
            text-align: center; 
            padding: 40px; 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            border-radius: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            max-width: 600px;
        }
        h1 { font-size: 3rem; margin-bottom: 10px; background: linear-gradient(to right, #4facfe, #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .domain { font-size: 1.2rem; color: #a2a8d3; margin-bottom: 25px; letter-spacing: 2px; }
        p { margin-bottom: 30px; color: #cbd5e0; line-height: 1.8; }
        .contact-btn { 
            display: inline-block; 
            padding: 15px 35px; 
            background: #4facfe; 
            color: white; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold; 
            transition: all 0.3s ease;
        }
        .contact-btn:hover { background: #00f2fe; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="hero">
        <h1>موقع السمر</h1>
        <div class="domain">AL SMR DIGITAL</div>
        <p>نصيغ المستقبل بأدوات رقمية مبتكرة. نحن هنا لنحوّل أفكارك إلى واقع ملموس يتميز بالدقة والاحترافية العالية.</p>
        <a href="mailto:admin@alSmr.com" class="contact-btn">ابدأ مشروعك الآن</a>
    </div>
</body>
</html>
